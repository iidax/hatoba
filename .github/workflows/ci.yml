name: CI

on:
  push:
    tags:
      - "v*"
  workflow_call:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: cargo test
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
